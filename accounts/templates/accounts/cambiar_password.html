{% extends "mi_app/base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px;">
    <h3>Cambiar Contraseña</h3>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background-color: #5a2d82; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
            Actualizar Contraseña
        </button>
    </form>
    <br>
    <a href="{% url 'editar_perfil' %}" style="color: #666;">Cancelar</a>
</div>
{% endblock %}
