{% extends "mi_app/base.html" %}

{% block content %}
    {{ form.media }}
    <h2>Cargar/Editar Alojamiento</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar Alojamiento</button>
    </form>

    <hr>
    <a href="{% url 'alojamiento_list' %}" class="btn btn-secondary">Cancelar</a>
{% endblock %}
