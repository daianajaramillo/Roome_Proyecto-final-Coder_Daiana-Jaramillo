{% extends "mi_app/base.html" %}

{% block content %}
<h2>Confirmar eliminación</h2>
<p>¿Estás seguro de que quieres eliminar el alojamiento <strong>"{{ object.nombre }}"</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" style="background-color: red;">Sí, Eliminar</button>
    <a href="{% url 'alojamiento_list' %}">Cancelar</a>
</form>
{% endblock %}
