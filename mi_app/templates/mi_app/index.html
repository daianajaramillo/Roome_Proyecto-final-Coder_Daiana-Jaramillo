{% extends 'mi_app/base.html' %}

{% block content %}
<div style="height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; border-radius: 20px; margin: 20px;">
    
    <h1 style="font-size: 3.5em; font-weight: 800; margin-bottom: 10px; color: var(--texto);">Bienvenido a Roome</h1>
    <p style="font-size: 1.2em; color: #444; margin-bottom: 30px; max-width: 600px;">
        Descubre lugares increíbles para quedarte y disfruta de experiencias inolvidables.
    </p>

    <form action="{% url 'buscar_alojamiento' %}" method="GET" style="display: flex; gap: 10px; width: 90%; max-width: 600px; background: white; padding: 10px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <input type="text" name="ciudad" placeholder="¿A dónde quieres ir? (Ej: Paris, Split...)" 
               style="flex-grow: 1; padding: 15px 25px; border: none; outline: none; font-size: 1em; border-radius: 50px;">
        <button type="submit" 
                style="background: var(--primario); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: 600;">
            Buscar
        </button>
    </form>
    
    <div style="margin-top: 40px;">
        <a href="{% url 'alojamiento_list' %}" style="color: var(--primario); font-weight: 600; text-decoration: none; font-size: 1.1em;">Ver todos los alojamientos →</a>
    </div>
</div>
{% endblock %}
